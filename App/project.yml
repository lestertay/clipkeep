name: ClipKeep
options:
  bundleIdPrefix: com.clipkeep
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
packages:
  ClipKeepCore:
    path: ../Core
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: 2.0.0
targets:
  ClipKeep:
    type: application
    platform: macOS
    sources:
      - path: Sources
    dependencies:
      - package: ClipKeepCore
        product: ClipKeepCore
      - package: KeyboardShortcuts
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.clipkeep.ClipKeep
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_ENTITLEMENTS: ClipKeep.entitlements
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
        SWIFT_VERSION: "6.0"
        INFOPLIST_KEY_LSUIElement: YES
        INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright © 2026"
        GENERATE_INFOPLIST_FILE: YES
